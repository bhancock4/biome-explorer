<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Crossy Road</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', system-ui, sans-serif; }
    #canvas {
      position: fixed; left: 0; top: 0;
      width: 100%; height: 100%;
      display: block; cursor: pointer; background: #1a1a2e;
    }
    #ui {
      position: fixed; left: 0; top: 0; width: 100%; height: 100%;
      pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #ui > * { pointer-events: auto; }
    #title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 0 #ff6b35, 0 4px 12px rgba(0,0,0,0.5);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    #startBtn {
      padding: 14px 32px;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      background: linear-gradient(180deg, #ffd93d 0%, #ff6b35 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 0 #c44d1a, 0 6px 20px rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #startBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #c44d1a, 0 8px 24px rgba(0,0,0,0.35);
    }
    #startBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #c44d1a; }
    #hint {
      margin-top: 16px;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      text-align: center;
      max-width: 280px;
    }
    #scorePanel {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.45);
      padding: 10px 20px;
      border-radius: 10px;
      display: none;
    }
    #scorePanel.visible { display: block; }
    #pausedOverlay {
      position: fixed; left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #pausedOverlay.visible { display: flex; }
    #pausedOverlay span {
      color: #fff; font-size: 28px; font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    #gameOver {
      position: fixed;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 32px;
      background: rgba(0,0,0,0.85);
      border-radius: 16px;
      border: 2px solid rgba(255,107,53,0.6);
      display: none;
    }
    #gameOver.visible { display: block; }
    #gameOver h2 {
      color: #ff6b35;
      font-size: 28px;
      margin-bottom: 8px;
    }
    #gameOver .finalScore { color: #ffd93d; font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    #restartBtn {
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      background: linear-gradient(180deg, #ffd93d 0%, #ff6b35 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 3px 0 #c44d1a;
    }
    #restartBtn:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="title">3D Crossy Road</div>
    <button id="startBtn">Play</button>
    <p id="hint">Arrow keys or WASD to hop. Don't get hit by cars! Stay on logs on water.</p>
  </div>
    <div id="scorePanel">Score: <span id="scoreValue">0</span></div>
    <div id="pausedOverlay">
      <span>Paused — press P to resume</span>
    </div>
    <div id="gameOver">
    <h2>Game Over</h2>
    <p class="finalScore">Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">Play Again</button>
  </div>
  <script src="js/three.min.js"></script>
  <script src="js/crossy-road.js"></script>
</body>
</html>
