<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biome Explorer — First Person</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: system-ui, sans-serif; }
    #canvas {
      position: fixed; left: 0; top: 0;
      width: 100%; height: 100%;
      display: block; cursor: pointer; background: #87ceeb;
    }
    #prompt {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.5);
      padding: 12px 24px;
      border-radius: 8px;
    }
    #stingOverlay {
      position: fixed; left: 0; top: 0; width: 100%; height: 100%;
      pointer-events: none; background: rgba(180,0,0,0.4);
      opacity: 0; transition: opacity 0.1s;
    }
    #crosshair {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    #crosshair::before {
      left: 50%; top: 0; width: 2px; height: 100%;
      margin-left: -1px;
    }
    #crosshair::after {
      top: 50%; left: 0; height: 2px; width: 100%;
      margin-top: -1px;
    }
    #hotbar {
      position: fixed; left: 50%; bottom: 12px;
      transform: translateX(-50%);
      display: flex; gap: 4px; pointer-events: none;
    }
    #hotbar .slot {
      position: relative;
      width: 48px; height: 48px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold; color: #fff;
      text-shadow: 0 1px 2px #000;
    }
    #hotbar .slot.selected {
      border-color: #ffc;
      box-shadow: 0 0 10px rgba(255,255,200,0.5);
    }
    #hotbar .slot .count { font-size: 11px; position: absolute; bottom: 2px; right: 4px; }
    #inventoryPanel {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 320px; max-height: 70vh;
      background: rgba(0,0,0,0.85);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 10px;
      padding: 16px;
      color: #fff;
      display: none;
      flex-direction: column;
      pointer-events: auto;
    }
    #inventoryPanel.open { display: flex; }
    #inventoryPanel h3 { margin-bottom: 12px; font-size: 18px; }
    #inventoryList {
      overflow-y: auto;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    #inventoryList .inv-item {
      width: 56px; height: 56px;
      background: rgba(80,80,80,0.8);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 12px; text-align: center;
    }
    #inventoryList .inv-item:hover { border-color: #ffc; background: rgba(100,100,80,0.9); }
    #inventoryList .inv-item .count { font-size: 10px; color: #aaa; }
    #inventoryPanel .hint { margin-top: 12px; font-size: 12px; color: #aaa; }
    #biomeHud {
      position: fixed; top: 12px; left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    #biomeHud.visible { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="biomeHud" aria-hidden="true"></div>
  <div id="stingOverlay"></div>
  <div id="crosshair"></div>
  <div id="hotbar"></div>
  <div id="useMessage" style="position:fixed;left:50%;top:30%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,0.7);padding:8px 16px;border-radius:6px;display:none;pointer-events:none;font-size:14px;"></div>
  <div id="inventoryPanel">
    <h3>Inventory (I to close)</h3>
    <div id="inventoryList"></div>
    <p class="hint">1–5: select loadout slot · Click item to equip to selected slot</p>
  </div>
  <div id="prompt">Click the game to play · WASD · Mouse look · Q fly · B punch · 1–5 loadout · I inventory</div>
  <script src="js/three.min.js"></script>
  <script src="js/biome game.js"></script>
  <script>
    window.addEventListener('load', function () {
      var c = document.getElementById('canvas');
      if (c) {
        c.style.width = window.innerWidth + 'px';
        c.style.height = window.innerHeight + 'px';
      }
    });
  </script>
</body>
</html>
