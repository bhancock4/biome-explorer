<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narrative RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1625;
      font-family: Georgia, serif;
      color: #e8e4e8;
      overflow: hidden;
    }
    #load-msg {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 20px;
      background: #2d5016;
      color: #fff;
      font-size: 18px;
      text-align: center;
      z-index: 100;
    }
    #load-msg.hidden { display: none; }
    #game-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0d14;
    }
    #canvas {
      display: block;
      background: #1a1625;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      pointer-events: none;
      z-index: 2;
    }
    #hud .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.6);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(180,160,200,0.25);
    }
    #hud .stat-name { font-size: 0.8rem; color: #9a8fa8; }
    #hud .stat-bar { width: 48px; height: 8px; background: #2d2638; border-radius: 4px; overflow: hidden; }
    #hud .stat-fill { height: 100%; background: linear-gradient(90deg, #6b5b7a, #9a7fb8); border-radius: 4px; transition: width 0.2s; }
    #hud .stat-value { font-size: 0.75rem; color: #b5a8c0; min-width: 1em; }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      pointer-events: none;
      z-index: 2;
    }
    #dialogue-overlay {
      position: fixed;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 20px;
    }
    #dialogue-overlay.visible { display: flex; }
    #dialogue-box {
      max-width: 520px;
      width: 100%;
      background: rgba(35, 30, 45, 0.98);
      border: 2px solid rgba(180, 160, 200, 0.4);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #dialogue-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; }
    #dialogue-choices { display: flex; flex-direction: column; gap: 8px; }
    #dialogue-choices button {
      text-align: left;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      color: #e8e4e8;
      background: rgba(50, 45, 65, 0.9);
      border: 1px solid rgba(180, 160, 200, 0.35);
      border-radius: 8px;
      cursor: pointer;
    }
    #dialogue-choices button:hover {
      background: rgba(70, 62, 90, 0.95);
      border-color: rgba(180, 160, 200, 0.55);
    }
    #dialogue-choices button.continue {
      background: rgba(100, 80, 130, 0.4);
      border-color: rgba(180, 160, 200, 0.5);
    }
  </style>
</head>
<body>
  <div id="load-msg">Loading game…</div>
  <div id="game-wrap"><canvas id="canvas"></canvas></div>
  <div id="hud"></div>
  <p id="hint">WASD or Arrows — move · E — talk</p>
  <div id="dialogue-overlay">
    <div id="dialogue-box">
      <div id="dialogue-text"></div>
      <div id="dialogue-choices"></div>
    </div>
  </div>
  <script src="js/narrative-rpg.js"></script>
</body>
</html>
